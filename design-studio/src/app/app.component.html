<div class="nlw-app">

  <header class="nlw-toolbar">
    <div class="toolbar-brand">
      <mat-icon class="brand-icon">auto_awesome</mat-icon>
      <span class="brand-name">NLW</span>
      <span class="brand-tagline">Natural Language → Wireframe → Code</span>
    </div>
    <div class="toolbar-actions">
      <span class="version-badge">v{{ version }}</span>
      <span class="stack-badge">Angular · Bootstrap · Material</span>
    </div>
  </header>

  <div class="nlw-panels">

    <div class="panel panel-prompt">
      <app-prompt-panel />
    </div>

    <div class="panel panel-canvas">
      <app-wireframe-canvas />
    </div>

    <div class="panel panel-code">
      <app-code-preview />
      <app-mapping-panel />
    </div>

  </div>

</div>
